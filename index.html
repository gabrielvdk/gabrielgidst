    :root {
      --ink: #1a1a1a;
      --paper: #f1f1f1;
      --paper-deep: #e4e4e4;
      --accent: #3a3a3a;
      --muted: #6c6c6c;
      --line: #cfcfcf;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-synthesis: none;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* subtle paper grain + vignette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.5), transparent 60%),
        radial-gradient(ellipse at 50% 120%, rgba(0,0,0,.06), transparent 55%);
    }

    a { color: inherit; }

    .eyebrow {
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .28em;
      font-size: .7rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* ---------- HERO (index) ---------- */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7vh 6vw;
      gap: 2.4rem;
    }

    .logo-mark {
      width: min(440px, 78vw);
      color: var(--ink);
      animation: rise .9s cubic-bezier(.2,.7,.2,1) both;
    }
    .logo-svg { width: 100%; height: auto; display: block; }

    .hero-text {
      max-width: 33ch;
      font-size: 1.18rem;
      color: var(--muted);
      animation: rise .9s cubic-bezier(.2,.7,.2,1) .15s both;
    }

    .hero-rule {
      width: 54px;
      height: 2px;
      background: var(--accent);
      animation: rise .9s cubic-bezier(.2,.7,.2,1) .25s both;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: .78rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--paper);
      background: var(--ink);
      padding: 1rem 1.9rem;
      border-radius: 999px;
      transition: transform .25s ease, background .25s ease;
      animation: rise .9s cubic-bezier(.2,.7,.2,1) .35s both;
    }
    .cta:hover { background: var(--accent); transform: translateY(-2px); }
    .cta .arrow { transition: transform .25s ease; }
    .cta:hover .arrow { transform: translateX(4px); }

    .hero-foot {
      position: absolute;
      bottom: 2.4rem;
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .68rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      animation: rise .9s ease .5s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- SESSIONS PAGE ---------- */
    .page { position: relative; z-index: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 6vw;
      border-bottom: 1px solid var(--line);
      gap: 1rem;
      flex-wrap: wrap;
    }
    .topbar .logo-mark { width: 168px; animation: none; }
    .back-link {
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .72rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      transition: color .2s ease;
    }
    .back-link:hover { color: var(--accent); }

    .wrap { max-width: 1060px; margin: 0 auto; padding: 0 6vw; }

    .page-head {
      text-align: center;
      padding: 5.5rem 0 3.5rem;
    }
    .page-head h1 {
      font-size: clamp(2.3rem, 5.5vw, 3.6rem);
      font-weight: 700;
      line-height: 1.1;
      margin: .8rem 0 1rem;
      letter-spacing: -.01em;
    }
    .page-head p {
      max-width: 46ch;
      margin: 0 auto;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .section { padding-bottom: 4.5rem; }
    .section-label {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.8rem;
      padding-bottom: .9rem;
      border-bottom: 1px solid var(--line);
    }
    .section-label h2 {
      font-size: 1.6rem;
      font-weight: 700;
    }
    .section-label .count {
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .72rem;
      letter-spacing: .14em;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.6rem;
    }

    .card {
      background: linear-gradient(180deg, #f9f9f9, var(--paper-deep));
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2.2rem 2.1rem;
      display: flex;
      flex-direction: column;
      gap: .85rem;
      position: relative;
      overflow: hidden;
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform .3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px -22px rgba(0,0,0,.4);
    }
    .card:hover::before { transform: scaleY(1); }

    .card .kicker {
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .68rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    .card h3 {
      font-size: 1.42rem;
      font-weight: 700;
      line-height: 1.25;
    }
    .card p {
      color: var(--muted);
      font-size: 1rem;
    }
    .card p.lede {
      color: var(--ink);
      font-size: 1.05rem;
      font-style: italic;
      font-weight: 400;
    }
    .card .meta {
      margin-top: auto;
      padding-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem .9rem;
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .72rem;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .card .meta span {
      background: rgba(58,58,58,.07);
      border: 1px solid rgba(58,58,58,.18);
      padding: .28rem .6rem;
      border-radius: 999px;
    }

    /* ---------- CONTACT ---------- */
    .contact {
      text-align: center;
      border-top: 1px solid var(--line);
      padding: 4.5rem 0 5.5rem;
    }
    .contact h2 {
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      font-weight: 700;
      margin: .6rem 0 1.4rem;
    }
    .contact .contact-note {
      max-width: 58ch;
      margin: 0 auto 1.8rem;
      color: var(--muted);
      font-size: 1.02rem;
    }
    .contact .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: .78rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--paper);
      background: var(--ink);
      padding: 1rem 1.9rem;
      border-radius: 999px;
      transition: transform .25s ease, background .25s ease;
    }
    .contact .linkedin-btn:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }
    .contact .li-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    footer {
      text-align: center;
      padding: 2.6rem 6vw;
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .footer-links {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .footer-links a {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .74rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      transition: color .2s ease;
    }
    .footer-links a:hover { color: var(--muted); }
    .footer-links .li-icon {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }
    .footer-sep {
      color: var(--line);
      font-size: .9rem;
    }
    .footer-copy {
      font-family: "GG Eina04", "Helvetica Neue", Arial, sans-serif;
      font-size: .68rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      .page-head { padding: 3.5rem 0 2.5rem; }
      .topbar { justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
